<!DOCTYPE html>
<html>
<head>
<title>Give Me Recipe</title>
<style>
body{
font-family:Arial;
background:#fafafa;
padding:40px;
text-align:center;
}

button{
padding:12px 20px;
font-size:16px;
background:#ff7043;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

#result{
margin-top:30px;
background:white;
padding:20px;
border-radius:10px;
max-width:600px;
margin-left:auto;
margin-right:auto;
}
</style>
</head>

<body>

<h1>🍽 Give Me Recipe</h1>
<p>Click the button to generate a sample recipe</p>

<button onclick="generateRecipe()">Give Me Recipe</button>

<div id="result"></div>

<script>
function generateRecipe(){

const recipe = {
name:"Garlic Lemon Chicken Bowl",
cuisine:"Mediterranean",
time:"30 mins",
calories:"420 kcal",
ingredients:[
"2 chicken breasts",
"2 cloves garlic",
"1 lemon",
"2 cups spinach",
"1 cup rice"
],
steps:[
"Cook the rice",
"Season and cook the chicken",
"Sauté garlic and spinach",
"Serve chicken over rice with lemon"
]
}

let html = `
<h2>${recipe.name}</h2>
<p><b>Cuisine:</b> ${recipe.cuisine}</p>
<p><b>Time:</b> ${recipe.time}</p>
<p><b>Calories:</b> ${recipe.calories}</p>

<h3>Ingredients</h3>
<ul>
${recipe.ingredients.map(i=>`<li>${i}</li>`).join("")}
</ul>

<h3>Steps</h3>
<ol>
${recipe.steps.map(i=>`<li>${i}</li>`).join("")}
</ol>
`

document.getElementById("result").innerHTML = html

}
</script>

</body>
</html>
